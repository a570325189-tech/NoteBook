<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人协同云记事本</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 14px;
        }

        /* 输入区域样式 */
        .input-area {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            resize: vertical;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary-color);
        }

        .media-buttons {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            border: 2px dashed #b4c2d3;
            color: #7f8c8d;
            background-color: transparent;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        #preview-img {
            max-width: 120px;
            max-height: 120px;
            margin-top: 10px;
            display: none;
            border-radius: 6px;
        }

        /* 状态提示 */
        .status-bar {
            text-align: center;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 6px;
            font-size: 14px;
            background-color: #e8f8f5;
            color: #117a65;
        }

        /* 笔记列表样式 */
        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .note-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
        }

        .note-time {
            font-size: 12px;
            color: #95a5a6;
            margin-bottom: 10px;
        }

        .note-content {
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .note-image {
            max-width: 100%;
            max-height: 350px;
            border-radius: 8px;
            margin-top: 12px;
            display: block;
        }

        .btn-delete {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            color: #7f8c8d;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌐 多人协同云记事本</h1>
    <div class="subtitle">所有打开此网页的人均可实时查看与编辑</div>

    <div class="status-bar" id="status-text">正在从云端同步数据...</div>

    <div class="input-area">
        <textarea id="note-text" placeholder="在这里输入内容，所有人都能看到..."></textarea>
        <img id="preview-img" src="" alt="预览图">
        <div class="media-buttons">
            <div class="file-input-wrapper">
                <button class="btn-upload" id="upload-btn-text">📷 添加图片</button>
                <input type="file" id="note-image-input" accept="image/*">
            </div>
            <button class="btn-submit" id="submit-btn" onclick="saveNote()">发送到云端</button>
        </div>
    </div>

    <div class="notes-list" id="notes-container">
        <div class="loading">正在加载云端笔记...</div>
    </div>
</div>

<script>
    // 【重要提示】这里使用了一个公共的测试存储空间（Bucket）
    // 为了防止你的内容被全世界其他不相干的人看到/覆盖，你可以把下面这段随机字符串修改成只有你和朋友知道的专属暗号（比如 "my_family_notebook_2026"）
    const BUCKET_ID = "shared_notebook_v1_demo_999"; 
    const API_URL = `https://kvdb.io/${BUCKET_ID}/notes_data`;

    let currentBase64Image = "";
    let isSaving = false;

    window.onload = function() {
        fetchNotes(); // 初始化加载
        
        // 每隔 10 秒自动刷新一次，同步别人的修改
        setInterval(fetchNotes, 10000);

        // 图片转 Base64 逻辑
        document.getElementById('note-image-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // 限制图片大小，防止云端数据库因单次传输过大而报错 (限制在1.5MB以内)
                if (file.size > 1.5 * 1024 * 1024) {
                    alert("图片太大了，请上传 1.5MB 以内的图片！");
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentBase64Image = event.target.result;
                    const preview = document.getElementById('preview-img');
                    preview.src = currentBase64Image;
                    preview.style.display = 'block';
                    document.getElementById('upload-btn-text').innerText = '更换图片';
                }
                reader.readAsDataURL(file);
            }
        });
    };

    // 从云端获取笔记
    function fetchNotes() {
        if(isSaving) return; // 正在保存时不要刷新，防止冲突
        
        updateStatus("正在从云端刷新...");
        fetch(API_URL)
            .then(res => {
                if (!res.ok) return []; // 如果是第一次使用，云端没有数据，返回空数组
                return res.json();
            })
            .then(notes => {
                renderNotes(notes);
                updateStatus("云端数据已同步（每10秒自动刷新）");
            })
            .catch(err => {
                console.error(err);
                updateStatus("同步失败，请检查网络联接");
            });
    }

    // 将数据渲染到页面
    function renderNotes(notes) {
        const container = document.getElementById('notes-container');
        if (!notes || notes.length === 0) {
            container.innerHTML = '<div class="loading">云端空空如也，快来写下第一条记录吧！</div>';
            return;
        }

        container.innerHTML = '';
        notes.forEach(note => {
            const card = document.createElement('div');
            card.className = 'note-card';
            let imageHtml = note.image ? `<img src="${note.image}" class="note-image">` : '';
            let textHtml = note.text ? `<div class="note-content">${escapeHtml(note.text)}</div>` : '';

            card.innerHTML = `
                <div class="note-time">🕒 ${note.time}</div>
                <button class="btn-delete" onclick="deleteNote(${note.id})">删除</button>
                ${textHtml}
                ${imageHtml}
            `;
            container.appendChild(card);
        });
    }

    // 保存笔记到云端
    function saveNote() {
        const textInput = document.getElementById('note-text');
        const textContent = textInput.value.trim();

        if (!textContent && !currentBase64Image) {
            alert('请先输入文字或选择图片！');
            return;
        }

        isSaving = true;
        updateStatus("正在提交到云端...");
        setFormDisabled(true);

        // 先获取最新的云端列表，再把新的加进去
        fetch(API_URL)
            .then(res => res.ok ? res.json() : [])
            .then(notes => {
                const newNote = {
                    id: Date.now(),
                    text: textContent,
                    image: currentBase64Image,
                    time: new Date().toLocaleString('zh-CN')
                };
                notes.unshift(newNote); // 放在最前面

                // 把更新后的完整列表发送回云端
                return fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(notes)
                });
            })
            .then(() => {
                // 清空输入框
                textInput.value = '';
                currentBase64Image = '';
                document.getElementById('preview-img').style.display = 'none';
                document.getElementById('note-image-input').value = '';
                document.getElementById('upload-btn-text').innerText = '📷 添加图片';
                
                isSaving = false;
                setFormDisabled(false);
                fetchNotes(); // 刷新列表
            })
            .catch(err => {
                alert("发送失败，请重试！");
                isSaving = false;
                setFormDisabled(false);
            });
    }

    // 从云端删除笔记
    function deleteNote(id) {
        if(!confirm('确定要删除这条云端笔记吗？所有人都会看不见它。')) return;

        isSaving = true;
        updateStatus("正在从云端删除...");

        fetch(API_URL)
            .then(res => res.json())
            .then(notes => {
                const updatedNotes = notes.filter(note => note.id !== id);
                return fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(updatedNotes)
                });
            })
            .then(() => {
                isSaving = false;
                fetchNotes();
            })
            .catch(err => {
                alert("删除失败");
                isSaving = false;
            });
    }

    function updateStatus(text) {
        document.getElementById('status-text').innerText = text;
    }

    function setFormDisabled(disabled) {
        document.getElementById('note-text').disabled = disabled;
        document.getElementById('submit-btn').disabled = disabled;
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
</script>

</body>
</html>
