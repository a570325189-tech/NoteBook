<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人协同云记事本 (Supabase 旗舰版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #3ecf8e;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .input-area {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            resize: vertical;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus {
            border-color: var(--primary-color);
        }

        .media-buttons {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            border: 2px dashed #b4c2d3;
            color: #7f8c8d;
            background-color: transparent;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .file-input-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .btn-submit {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-submit:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        #preview-img {
            max-width: 120px;
            max-height: 120px;
            margin-top: 10px;
            display: none;
            border-radius: 6px;
        }

        .status-bar {
            text-align: center;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 6px;
            font-size: 14px;
            background-color: #e8f8f5;
            color: #117a65;
        }

        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .note-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
        }

        .note-time {
            font-size: 12px;
            color: #95a5a6;
            margin-bottom: 10px;
        }

        .note-content {
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .note-image {
            max-width: 100%;
            max-height: 450px;
            border-radius: 8px;
            margin-top: 12px;
            display: block;
        }

        .btn-delete {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #e74c3c;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            color: #7f8c8d;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌐 多人协同云记事本</h1>
    <div class="subtitle">基于 Supabase 强力驱动 · 全网高稳定同步</div>

    <div class="status-bar" id="status-text">正在初始化云端数据库...</div>

    <div class="input-area">
        <textarea id="note-text" placeholder="在这里输入内容，所有人都能看到..."></textarea>
        <img id="preview-img" src="" alt="预览图">
        <div class="media-buttons">
            <div class="file-input-wrapper">
                <button class="btn-upload" id="upload-btn-text">📷 添加图片</button>
                <input type="file" id="note-image-input" accept="image/*">
            </div>
            <button class="btn-submit" id="submit-btn" onclick="saveNote()">发送到云端</button>
        </div>
    </div>

    <div class="notes-list" id="notes-container">
        <div class="loading">正在同步云端笔记...</div>
    </div>
</div>

<script>
    // 填入你在第一步中申请到的 Supabase 凭证
    const SUPABASE_URL = "请在这里粘贴你的Project URL";
    const SUPABASE_ANON_KEY = "请在这里粘贴你的anon public密钥";

    // 初始化 Supabase 客户端
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    document.getElementById('status-text').innerText = "云端连接成功！";

    let currentBase64Image = "";

    window.onload = function() {
        if(SUPABASE_URL !== "请在这里粘贴你的Project URL") {
            fetchNotes();
            setInterval(fetchNotes, 10000); // 每 10 秒自动刷新
        }

        // 图片转换
        document.getElementById('note-image-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 1.5 * 1024 * 1024) {
                    alert("图片超过 1.5MB，请上传较小的图片！");
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentBase64Image = event.target.result;
                    const preview = document.getElementById('preview-img');
                    preview.src = currentBase64Image;
                    preview.style.display = 'block';
                    document.getElementById('upload-btn-text').innerText = '更换图片';
                }
                reader.readAsDataURL(file);
            }
        });
    };

    // 获取云端笔记
    async function fetchNotes() {
        const { data, error } = await _supabase
            .from('notes')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            document.getElementById('status-text').innerText = "刷新失败: " + error.message;
            return;
        }
        renderNotes(data);
        document.getElementById('status-text').innerText = "云端同步成功 (" + new Date().toLocaleTimeString() + ")";
    }

    // 渲染页面
    function renderNotes(notes) {
        const container = document.getElementById('notes-container');
        if (!notes || notes.length === 0) {
            container.innerHTML = '<div class="loading">云端空空如也，快来写下第一条记录吧！</div>';
            return;
        }

        container.innerHTML = '';
        notes.forEach(note => {
            const card = document.createElement('div');
            card.className = 'note-card';

            let imageHtml = note.image ? `<img src="${note.image}" class="note-image">` : '';
            let textHtml = note.text ? `<div class="note-content">${escapeHtml(note.text)}</div>` : '';
            let localTime = new Date(note.created_at).toLocaleString('zh-CN');

            card.innerHTML = `
                <div class="note-time">🕒 ${localTime}</div>
                <button class="btn-delete" onclick="deleteNote(${note.id})">删除</button>
                ${textHtml}
                ${imageHtml}
            `;
            container.appendChild(card);
        });
    }

    // 保存笔记
    async function saveNote() {
        const textInput = document.getElementById('note-text');
        const textContent = textInput.value.trim();
        const submitBtn = document.getElementById('submit-btn');

        if (!textContent && !currentBase64Image) {
            alert('请先输入文字或选择图片！');
            return;
        }

        submitBtn.disabled = true;
        document.getElementById('status-text').innerText = "正在同步至全球云端...";

        const { error } = await _supabase
            .from('notes')
            .insert([{ text: textContent, image: currentBase64Image }]);

        if (error) {
            alert('保存失败: ' + error.message);
        } else {
            textInput.value = '';
            currentBase64Image = '';
            document.getElementById('preview-img').style.display = 'none';
            document.getElementById('note-image-input').value = '';
            document.getElementById('upload-btn-text').innerText = '📷 添加图片';
            fetchNotes();
        }
        submitBtn.disabled = false;
    }

    // 删除笔记
    async function deleteNote(id) {
        if (!confirm('确定要删除这条云端笔记吗？所有人都会看不见。')) return;

        document.getElementById('status-text').innerText = "正在从云端移除...";
        const { error } = await _supabase
            .from('notes')
            .delete()
            .eq('id', id);

        if (error) {
            alert('删除失败: ' + error.message);
        } else {
            fetchNotes();
        }
    }

    function escapeHtml(text) {
        return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
</script>

</body>
</html>
